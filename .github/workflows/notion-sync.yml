name: Notion Sync

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]

jobs:
  sync-to-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Sync to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          EVENT: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ "$EVENT" = "push" ]; then
            COMMITS=$(echo '${{ toJson(github.event.commits) }}' | python3 -c "
          import json, sys
          commits = json.load(sys.stdin)
          for c in commits:
              print(json.dumps({
                  'tipo': 'commit',
                  'title': c['message'].split('\n')[0][:100],
                  'autor': c['author']['name'],
                  'url': c['url'],
                  'sha': c['id'][:7],
                  'data': c['timestamp']
              }))
          ")
            echo "$COMMITS" | while IFS= read -r line; do
              TITLE=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['title'])")
              AUTOR=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['autor'])")
              URL=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['url'])")
              SHA=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['sha'])")
              DATA=$(echo "$line" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['data'])")
              curl -s -X POST https://api.notion.com/v1/pages \
                -H "Authorization: Bearer $NOTION_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Notion-Version: 2022-06-28" \
                -d "{
                  \"parent\": {\"database_id\": \"$NOTION_DATABASE_ID\"},
                  \"properties\": {
                    \"Nome\": {\"title\": [{\"text\": {\"content\": \"$TITLE\"}}]},
                    \"Tipo\": {\"select\": {\"name\": \"commit\"}},
                    \"Repo\": {\"select\": {\"name\": \"$REPO\"}},
                    \"Autor\": {\"rich_text\": [{\"text\": {\"content\": \"$AUTOR\"}}]},
                    \"URL\": {\"url\": \"$URL\"},
                    \"SHA_ID\": {\"rich_text\": [{\"text\": {\"content\": \"$SHA\"}}]},
                    \"Data\": {\"date\": {\"start\": \"$DATA\"}}
                  }
                }"
            done

          elif [ "$EVENT" = "pull_request" ]; then
            TITLE="${{ github.event.pull_request.title }}"
            URL="${{ github.event.pull_request.html_url }}"
            NUMBER="${{ github.event.pull_request.number }}"
            STATE="${{ github.event.pull_request.state }}"
            MERGED="${{ github.event.pull_request.merged }}"
            if [ "$MERGED" = "true" ]; then STATE="merged"; fi
            DATE="${{ github.event.pull_request.created_at }}"
            curl -s -X POST https://api.notion.com/v1/pages \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "{
                \"parent\": {\"database_id\": \"$NOTION_DATABASE_ID\"},
                \"properties\": {
                  \"Nome\": {\"title\": [{\"text\": {\"content\": \"$TITLE\"}}]},
                  \"Tipo\": {\"select\": {\"name\": \"PR\"}},
                  \"Repo\": {\"select\": {\"name\": \"$REPO\"}},
                  \"Autor\": {\"rich_text\": [{\"text\": {\"content\": \"$ACTOR\"}}]},
                  \"Estado\": {\"select\": {\"name\": \"$STATE\"}},
                  \"URL\": {\"url\": \"$URL\"},
                  \"SHA_ID\": {\"rich_text\": [{\"text\": {\"content\": \"#$NUMBER\"}}]},
                  \"Data\": {\"date\": {\"start\": \"$DATE\"}}
                }
              }"

          elif [ "$EVENT" = "issues" ]; then
            TITLE="${{ github.event.issue.title }}"
            URL="${{ github.event.issue.html_url }}"
            NUMBER="${{ github.event.issue.number }}"
            STATE="${{ github.event.issue.state }}"
            DATE="${{ github.event.issue.created_at }}"
            curl -s -X POST https://api.notion.com/v1/pages \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Notion-Version: 2022-06-28" \
              -d "{
                \"parent\": {\"database_id\": \"$NOTION_DATABASE_ID\"},
                \"properties\": {
                  \"Nome\": {\"title\": [{\"text\": {\"content\": \"$TITLE\"}}]},
                  \"Tipo\": {\"select\": {\"name\": \"issue\"}},
                  \"Repo\": {\"select\": {\"name\": \"$REPO\"}},
                  \"Autor\": {\"rich_text\": [{\"text\": {\"content\": \"$ACTOR\"}}]},
                  \"Estado\": {\"select\": {\"name\": \"$STATE\"}},
                  \"URL\": {\"url\": \"$URL\"},
                  \"SHA_ID\": {\"rich_text\": [{\"text\": {\"content\": \"#$NUMBER\"}}]},
                  \"Data\": {\"date\": {\"start\": \"$DATE\"}}
                }
              }"
          fi
